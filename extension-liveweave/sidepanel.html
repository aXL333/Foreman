<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Foreman LiveWeave</title>
  <style>
    body { font-family: "Segoe UI", system-ui, sans-serif; background: #0d0f12; color: #e6e8ec; margin: 0; padding: 14px; }
    h1 { font-size: 15px; margin: 0 0 10px; }
    #badge { display: inline-block; font-size: 12px; padding: 3px 9px; border-radius: 999px; margin-bottom: 8px; }
    #badge.ok { background: #14321f; color: #4ade80; }
    #badge.warn { background: #322a14; color: #fbbf24; }
    #badge.bad { background: #321414; color: #f87171; }
    #hint { font-size: 12px; color: #9aa3ad; margin-bottom: 12px; line-height: 1.4; }
    .row { display: flex; gap: 8px; margin-top: 12px; }
    button { background: #15181d; color: #e6e8ec; border: 1px solid #2a2f37; border-radius: 6px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    button.primary { background: #4ade80; color: #0d0f12; border: 0; font-weight: 700; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
    .grid .label { display: block; font-size: 11px; color: #9aa3ad; }
    a { color: #7dd3fc; cursor: pointer; }
    .muted { color: #9aa3ad; font-size: 12px; }
  </style>
</head>
<body>
  <h1>🧩 Foreman LiveWeave</h1>
  <div id="badge" class="warn">…</div>
  <div id="hint"></div>
  <div id="body"></div>
  <div class="row">
    <button id="openCanvas" class="primary">Open canvas</button>
    <button id="refresh">Refresh</button>
  </div>
  <script type="module" src="sidepanel.js"></script>
</body>
</html>
