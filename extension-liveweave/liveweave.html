<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>LiveWeave Canvas</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", system-ui, sans-serif; background: #0d0f12; color: #e6e8ec; }
    header { height: 42px; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; border-bottom: 1px solid #2a2f37; background: #15181d; box-sizing: border-box; }
    h1 { font-size: 13px; margin: 0; font-weight: 600; }
    #meta { font-size: 11px; color: #9aa3ad; }
    iframe { width: 100%; height: calc(100vh - 42px); border: 0; background: white; display: block; }
  </style>
</head>
<body>
  <header>
    <h1 id="title">LiveWeave Canvas</h1>
    <div id="meta">local extension page</div>
  </header>
  <!-- Display surface, not a form host: allow-forms is dropped so agent content can't POST operator input
       off-machine (the CSP's form-action 'none' is the belt to this suspenders). -->
  <iframe id="preview" title="LiveWeave preview" sandbox="allow-scripts"></iframe>
  <script type="module" src="liveweave.js"></script>
</body>
</html>
