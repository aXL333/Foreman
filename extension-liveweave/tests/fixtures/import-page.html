<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LiveWeave Import Fixture</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #f5f7fb; color: #172033; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    section { width: min(720px, 100%); border: 1px solid #d9deea; background: white; padding: 32px; border-radius: 8px; box-shadow: 0 16px 44px rgba(23,32,51,.12); }
    p { color: #566176; line-height: 1.6; }
    button { border: 0; background: #2458d3; color: white; padding: 10px 16px; border-radius: 6px; }
  </style>
</head>
<body>
  <main>
    <section id="fixture-card">
      <p>Controlled HTTP fixture</p>
      <h1>Import this page into LiveWeave</h1>
      <p>The capture should retain this structure and styling while removing executable behavior.</p>
      <button type="button" onclick="document.body.dataset.clicked='yes'">Fixture action</button>
    </section>
  </main>
  <script>document.documentElement.dataset.fixtureReady = 'true';</script>
</body>
</html>
