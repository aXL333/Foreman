<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: "Segoe UI", system-ui, sans-serif; background: #0d0f12; color: #e6e8ec; margin: 0; padding: 14px; }
    #badge { font-size: 15px; font-weight: 700; padding: 8px 10px; border-radius: 8px; text-align: center; }
    .ok { background: #10391f; color: #4ade80; }
    .warn { background: #3a2a10; color: #fbbf24; }
    #hint { color: #6b7280; font-size: 11px; text-align: center; margin: 6px 0 12px; }
    pre { background: #15181d; border: 1px solid #2a2f37; border-radius: 6px; padding: 10px; font-size: 11px; white-space: pre-wrap; word-break: break-word; max-height: 50vh; overflow: auto; }
    #status { min-height: 120px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; background: #15181d; border: 1px solid #2a2f37; border-radius: 6px; padding: 12px; font-size: 12px; }
    .label { display: block; color: #6b7280; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-weight: 700; font-size: 11px; text-transform: uppercase; }
    .pill.ok { background: #10391f; color: #4ade80; }
    .pill.warn { background: #3a2a10; color: #fbbf24; }
    .pill.bad { background: #3a1010; color: #f87171; }
    .muted, .err { background: #15181d; border: 1px solid #2a2f37; border-radius: 6px; padding: 12px; font-size: 12px; color: #9ca3af; }
    .err { color: #fca5a5; border-color: #4a2020; }
    .warn-text { color: #fbbf24 !important; }
    button { width: 100%; background: #15181d; color: #e6e8ec; border: 1px solid #2a2f37; border-radius: 6px; padding: 8px; cursor: pointer; margin-bottom: 10px; }
    a { color: #4ade80; cursor: pointer; }
  </style>
</head>
<body>
  <div id="badge" class="warn">…</div>
  <div id="hint"></div>
  <button id="refresh">Refresh</button>
  <div id="status"></div>
  <script src="sidepanel.js"></script>
</body>
</html>
