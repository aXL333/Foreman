name: Bug report
description: Report a Foreman defect or crash.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact Foreman version/commit and what you were doing.
      placeholder: |
        1. Launch Foreman...
        2. Connect Codex...
        3. Open...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2 x64"
  - type: textarea
    id: context
    attributes:
      label: Relevant context
      description: Logs, screenshots, settings, connected agents, or MCP config snippets. Remove tokens/secrets first.
