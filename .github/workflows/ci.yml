name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build & test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore Foreman.slnx

      - name: Build
        run: dotnet build Foreman.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Foreman.slnx -c Release --no-build --verbosity normal
