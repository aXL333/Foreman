name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (without leading v), e.g. 0.1.0'
        required: true

permissions:
  contents: write
  actions: read       # SignPath downloads the build artifact via the Actions API using github.token
  id-token: write     # OIDC token for the keyless Sigstore attestation (build provenance)
  attestations: write # write the provenance attestation to the repo's attestation store

jobs:
  release:
    name: Build installer & publish release
    runs-on: windows-latest
    env:
      # Code signing is OPT-IN. The SignPath steps run only once SIGNPATH_ORGANIZATION_ID is set as a
      # repository *Variable* (Settings -> Secrets and variables -> Actions -> Variables). Until then the
      # release builds and ships UNSIGNED with SHA-256 checksums, exactly as before — nothing breaks.
      # One-time setup (free OSS signing via SignPath Foundation): see docs/release-checklist.md.
      SIGN: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up .NET 10
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: ver
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          $raw = if ($env:EVENT_NAME -eq 'workflow_dispatch') { $env:INPUT_VERSION } else { $env:REF_NAME }
          $v = $raw.Trim()
          if ($v.StartsWith('v', [StringComparison]::OrdinalIgnoreCase)) { $v = $v.Substring(1) }
          if ($v -notmatch '^\d+\.\d+\.\d+(?:-[0-9A-Za-z]+(?:[.-][0-9A-Za-z]+)*)?(?:\+[0-9A-Za-z]+(?:[.-][0-9A-Za-z]+)*)?$') {
            throw "Release version '$v' is not valid SemVer."
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          "is_prerelease=$(if ($v -match '^\d+\.\d+\.\d+-') { 'true' } else { 'false' })" >> $env:GITHUB_OUTPUT

      - name: Report signing mode
        shell: pwsh
        run: |
          if ('${{ env.SIGN }}' -eq 'true') { Write-Host '::notice::SignPath signing ENABLED — all app payload executables + installer will be signed.' }
          else { Write-Host '::warning::SignPath not configured (SIGNPATH_ORGANIZATION_ID unset) — release will be UNSIGNED (checksums only).' }

      - name: Validate browser extensions
        shell: pwsh
        run: |
          $files = Get-ChildItem extension, extension-liveweave -Recurse -File |
            Where-Object { $_.Extension -in '.js', '.mjs' -and $_.FullName -notmatch '[\\/]tests[\\/]fixtures[\\/]' }
          foreach ($file in $files) {
            node --check $file.FullName
            if ($LASTEXITCODE -ne 0) { throw "JavaScript syntax check failed: $($file.FullName)" }
          }
          node --test extension-liveweave/tests/project-model.test.mjs
          if ($LASTEXITCODE -ne 0) { throw "LiveWeave tests failed." }

      - name: Test release commit
        run: dotnet test Foreman.slnx -c Release --verbosity minimal

      - name: Publish self-contained single-file
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: >
          dotnet publish src/Foreman.App/Foreman.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=$env:RELEASE_VERSION
          -p:DebugType=none -p:DebugSymbols=false
          -o publish

      # The app's CopyEtwSidecar target only stages the sidecar for *builds* (bin\), not publish —
      # and the self-contained single-file app can't share its bundled runtime anyway. So the sidecar
      # is published separately, itself self-contained, into the sidecar\ subfolder the app launches
      # from (<app>\sidecar\Foreman.EtwSidecar.exe).
      - name: Publish elevated ETW sidecar (self-contained)
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: >
          dotnet publish src/Foreman.EtwSidecar/Foreman.EtwSidecar.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=$env:RELEASE_VERSION
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/sidecar

      # Same story for the OPT-IN hardened guardian (separate process, installed on demand): its CopyGuardian
      # target only stages it for *builds* (bin\), and the single-file app can't share its bundled runtime — so
      # publish it separately, self-contained, into the guardian\ subfolder the app launches from
      # (<app>\guardian\Foreman.Guardian.exe). Without this step the "Enable hardened guardian" action is
      # unreachable in released builds (the install path returns "Reinstall Foreman Agent Safety").
      # The SignPath app-payload configuration must include every executable published here; the signed-payload
      # verification below enforces that external configuration before the installer is built.
      - name: Publish hardened guardian (self-contained)
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: >
          dotnet publish src/Foreman.Guardian/Foreman.Guardian.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=$env:RELEASE_VERSION
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/guardian

      # Desktop CU and the Local Agent Host are separate processes too. App-project build targets stage their
      # framework-dependent outputs under bin\ for developer builds, but dotnet publish -o does not carry those
      # executables into the installer payload. Publish each one explicitly and self-contained.
      - name: Publish desktop CU sidecar (self-contained)
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: >
          dotnet publish src/Foreman.CuSidecar/Foreman.CuSidecar.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=$env:RELEASE_VERSION
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/cu-sidecar

      - name: Publish Local Agent Host pilot shim (self-contained)
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: >
          dotnet publish src/Foreman.CuPilot/Foreman.CuPilot.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=$env:RELEASE_VERSION
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/cu-pilot

      - name: Tidy publish payload
        shell: pwsh
        run: |   # stray project-to-project leftovers at root
          Remove-Item publish/Foreman.EtwSidecar.* -ErrorAction SilentlyContinue
          Remove-Item publish/Foreman.Guardian.*  -ErrorAction SilentlyContinue
          Remove-Item publish/Foreman.CuSidecar.* -ErrorAction SilentlyContinue
          Remove-Item publish/Foreman.CuPilot.*   -ErrorAction SilentlyContinue

      - name: Verify release payload layout and version
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/Test-ReleasePayload.ps1 -PayloadPath publish -ExpectedVersion $env:RELEASE_VERSION

      # --- Sign every executable in the app payload BEFORE building the installer, so the installer embeds
      #     already-signed binaries. SignPath signs only the files named in the "app" artifact configuration
      #     and passes everything else through untouched. The verification step below fails closed if that
      #     external configuration omitted a newly-added executable.
      #     Signing identity + timestamping live in the SignPath signing policy, not here. ---
      - name: Upload unsigned app payload
        id: upload-app
        if: ${{ env.SIGN == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: foreman-app-unsigned
          path: publish
          retention-days: 1

      - name: Sign app payload (SignPath)
        if: ${{ env.SIGN == 'true' }}
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: '${{ vars.SIGNPATH_PROJECT_SLUG }}'
          signing-policy-slug: '${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}'
          artifact-configuration-slug: '${{ vars.SIGNPATH_APP_ARTIFACT_CONFIG_SLUG }}'
          github-artifact-id: '${{ steps.upload-app.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: signed-app

      - name: Overlay signed app binaries
        if: ${{ env.SIGN == 'true' }}
        shell: pwsh
        run: Copy-Item -Path signed-app/* -Destination publish -Recurse -Force

      - name: Verify signed app payload
        if: ${{ env.SIGN == 'true' }}
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/Test-ReleasePayload.ps1 -PayloadPath publish -ExpectedVersion $env:RELEASE_VERSION -RequireValidSignatures

      - name: Build installer (Inno Setup)
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$env:RELEASE_VERSION" installer/foreman.iss

      # --- Sign the installer itself LAST, after it is built from the already-signed payload. ---
      - name: Upload unsigned installer
        id: upload-installer
        if: ${{ env.SIGN == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: foreman-installer-unsigned
          path: installer/Output/*.exe
          retention-days: 1

      - name: Sign installer (SignPath)
        if: ${{ env.SIGN == 'true' }}
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: '${{ vars.SIGNPATH_PROJECT_SLUG }}'
          signing-policy-slug: '${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}'
          artifact-configuration-slug: '${{ vars.SIGNPATH_INSTALLER_ARTIFACT_CONFIG_SLUG }}'
          github-artifact-id: '${{ steps.upload-installer.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: signed-installer

      - name: Overlay signed installer
        if: ${{ env.SIGN == 'true' }}
        shell: pwsh
        run: Copy-Item -Path signed-installer/*.exe -Destination installer/Output -Force

      - name: Verify signed installer
        if: ${{ env.SIGN == 'true' }}
        shell: pwsh
        run: |
          $bad = Get-ChildItem installer/Output/*.exe | Where-Object {
            (Get-AuthenticodeSignature -LiteralPath $_.FullName).Status -ne 'Valid'
          }
          if ($bad) { throw "SignPath returned an installer without a valid Authenticode signature: $($bad.Name -join ', ')" }

      # Checksums run AFTER signing so they cover the final (signed) installer.
      - name: Generate checksums
        shell: pwsh
        run: |
          Get-FileHash installer/Output/*.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content -Encoding ASCII installer/Output/checksums-sha256.txt

      # Supply-chain provenance: a keyless Sigstore attestation binding each shipped artifact to THIS repo,
      # commit, and workflow run. Independent of code signing (runs whether SignPath is configured or not), and
      # runs AFTER signing so the attested digests are the final, signed bytes. GitHub stores the attestation, so
      # nothing extra is attached to the Release; anyone can verify a download with:
      #   gh attestation verify <file> --repo ${{ github.repository }}
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            installer/Output/*.exe
            publish/Foreman.exe
            publish/sidecar/Foreman.EtwSidecar.exe
            publish/guardian/Foreman.Guardian.exe
            publish/cu-sidecar/Foreman.CuSidecar.exe
            publish/cu-pilot/Foreman.CuPilot.exe

      - name: Attach installer to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.ver.outputs.is_prerelease == 'true' }}
          files: |
            installer/Output/*.exe
            installer/Output/checksums-sha256.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
