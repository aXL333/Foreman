name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (without leading v), e.g. 0.1.0'
        required: true

permissions:
  contents: write
  actions: read     # SignPath downloads the build artifact via the Actions API using github.token

jobs:
  release:
    name: Build installer & publish release
    runs-on: windows-latest
    env:
      # Code signing is OPT-IN. The SignPath steps run only once SIGNPATH_ORGANIZATION_ID is set as a
      # repository *Variable* (Settings -> Secrets and variables -> Actions -> Variables). Until then the
      # release builds and ships UNSIGNED with SHA-256 checksums, exactly as before — nothing breaks.
      # One-time setup (free OSS signing via SignPath Foundation): see docs/release-checklist.md.
      SIGN: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $v = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ github.event.inputs.version }}' } else { '${{ github.ref_name }}'.TrimStart('v') }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Report signing mode
        shell: pwsh
        run: |
          if ('${{ env.SIGN }}' -eq 'true') { Write-Host '::notice::SignPath signing ENABLED — app payload + installer will be signed.' }
          else { Write-Host '::warning::SignPath not configured (SIGNPATH_ORGANIZATION_ID unset) — release will be UNSIGNED (checksums only).' }

      - name: Publish self-contained single-file
        run: >
          dotnet publish src/Foreman.App/Foreman.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none -p:DebugSymbols=false
          -o publish

      # The app's CopyEtwSidecar target only stages the sidecar for *builds* (bin\), not publish —
      # and the self-contained single-file app can't share its bundled runtime anyway. So the sidecar
      # is published separately, itself self-contained, into the sidecar\ subfolder the app launches
      # from (<app>\sidecar\Foreman.EtwSidecar.exe).
      - name: Publish elevated ETW sidecar (self-contained)
        run: >
          dotnet publish src/Foreman.EtwSidecar/Foreman.EtwSidecar.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/sidecar

      - name: Tidy publish payload
        shell: pwsh
        run: Remove-Item publish/Foreman.EtwSidecar.* -ErrorAction SilentlyContinue   # stray P2P leftovers at root

      # --- Sign the app payload (Foreman.exe + sidecar/Foreman.EtwSidecar.exe) BEFORE building the
      #     installer, so the installer embeds already-signed binaries. SignPath signs only the files
      #     named in the "app" artifact configuration and passes everything else through untouched.
      #     Signing identity + timestamping live in the SignPath signing policy, not here. ---
      - name: Upload unsigned app payload
        id: upload-app
        if: ${{ env.SIGN == 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: foreman-app-unsigned
          path: publish
          retention-days: 1

      - name: Sign app payload (SignPath)
        if: ${{ env.SIGN == 'true' }}
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: '${{ vars.SIGNPATH_PROJECT_SLUG }}'
          signing-policy-slug: '${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}'
          artifact-configuration-slug: '${{ vars.SIGNPATH_APP_ARTIFACT_CONFIG_SLUG }}'
          github-artifact-id: '${{ steps.upload-app.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: signed-app

      - name: Overlay signed app binaries
        if: ${{ env.SIGN == 'true' }}
        shell: pwsh
        run: Copy-Item -Path signed-app/* -Destination publish -Recurse -Force

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ steps.ver.outputs.version }}" installer/foreman.iss

      # --- Sign the installer itself LAST, after it is built from the already-signed payload. ---
      - name: Upload unsigned installer
        id: upload-installer
        if: ${{ env.SIGN == 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: foreman-installer-unsigned
          path: installer/Output/*.exe
          retention-days: 1

      - name: Sign installer (SignPath)
        if: ${{ env.SIGN == 'true' }}
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: '${{ vars.SIGNPATH_PROJECT_SLUG }}'
          signing-policy-slug: '${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}'
          artifact-configuration-slug: '${{ vars.SIGNPATH_INSTALLER_ARTIFACT_CONFIG_SLUG }}'
          github-artifact-id: '${{ steps.upload-installer.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: signed-installer

      - name: Overlay signed installer
        if: ${{ env.SIGN == 'true' }}
        shell: pwsh
        run: Copy-Item -Path signed-installer/*.exe -Destination installer/Output -Force

      # Checksums run AFTER signing so they cover the final (signed) installer.
      - name: Generate checksums
        shell: pwsh
        run: |
          Get-FileHash installer/Output/*.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content -Encoding ASCII installer/Output/checksums-sha256.txt

      - name: Attach installer to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
          files: |
            installer/Output/*.exe
            installer/Output/checksums-sha256.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
